    mediatek/mt7988a-rfb-spim-nand-factory.dtbo \
    mediatek/mt7988a-rfb-spim-nand-nmbm.dtbo \
    mediatek/mt7988a-rfb-spim-nor.dtbo \
    mediatek/mt7988a-rfb-eth1-i2p5g-phy.dtbo \
